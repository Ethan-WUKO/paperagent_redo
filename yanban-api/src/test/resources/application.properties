spring.kafka.listener.auto-startup=false

# Use an H2-compatible copy of Flyway migrations in tests; production migrations remain immutable after being applied.
spring.flyway.locations=classpath:db/migration-h2

# Disable invite code requirement in tests by default; specific tests can override.
yanban.invite.enabled=false

# Scheduled recovery jobs are tested directly; keep them off in integration test contexts to avoid timing races.
yanban.literature.task.scanner.enabled=false

# Demo seeding can ingest/vectorize content through external providers; integration tests must stay hermetic.
yanban.demo.enabled=false
yanban.demo.seed-on-startup=false
