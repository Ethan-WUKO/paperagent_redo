name: yanban-agent-prod

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yanban_agent}
      MYSQL_USER: ${MYSQL_USER:-yanban}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:${YANBAN_SANDBOX_MYSQL_HOST_PORT:-13306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20

  sandbox-db-init:
    profiles: ["sandbox"]
    image: mysql:8.0
    restart: "no"
    environment:
      MYSQL_PWD: ${MYSQL_ROOT_PASSWORD}
      SANDBOX_DB_NAME: ${YANBAN_SANDBOX_DB_NAME:-yanban_sandbox}
      SANDBOX_DB_USER: ${YANBAN_SANDBOX_DB_USER:-yanban_sandbox_broker}
      SANDBOX_DB_PASSWORD: ${YANBAN_SANDBOX_DB_PASSWORD:-}
    entrypoint: ["/bin/sh", "/opt/yanban/init-e2b-database.sh"]
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./deploy/sandbox/init-e2b-database.sh:/opt/yanban/init-e2b-database.sh:ro

  redis:
    image: redis:7
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          redis-server --appendonly yes
        fi
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.4
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms768m -Xmx768m}
      TZ: Asia/Shanghai
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30

  kafka:
    image: apache/kafka:3.8.1
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
      TZ: Asia/Shanghai
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-yanbanminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-yanban_agent}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_USER: ${MYSQL_USER:-yanban}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      YANBAN_ES_ENDPOINT: http://elasticsearch:9200
      YANBAN_MINIO_ENDPOINT: http://minio:9000
      YANBAN_MINIO_SECURE: "false"
      YANBAN_SANDBOX_BROKER_URL: ${YANBAN_SANDBOX_BROKER_URL:-http://sandbox-broker:8091}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - api_data:/app/data

  sandbox-broker:
    profiles: ["sandbox"]
    build:
      context: .
      dockerfile: Dockerfile.sandbox-broker
    restart: unless-stopped
    environment:
      YANBAN_SANDBOX_BROKER_ENABLED: "true"
      YANBAN_SANDBOX_BROKER_PROVIDER: E2B
      YANBAN_SANDBOX_BROKER_ADDRESS: 0.0.0.0
      YANBAN_SANDBOX_BROKER_MODE: PRODUCTION
      YANBAN_SANDBOX_BROKER_USER: yanban-sandbox
      YANBAN_SANDBOX_BROKER_REMOTE: "false"
      YANBAN_SANDBOX_WORKSPACE_ROOT: /var/lib/yanban-sandbox/work
      YANBAN_SANDBOX_BROKER_TOKEN: ${YANBAN_SANDBOX_BROKER_TOKEN:-}
      YANBAN_SANDBOX_DB_USER: ${YANBAN_SANDBOX_DB_USER:-yanban_sandbox_broker}
      YANBAN_SANDBOX_DB_PASSWORD: ${YANBAN_SANDBOX_DB_PASSWORD:-}
      YANBAN_E2B_PYTHON_EXECUTABLE: /opt/e2b-venv/bin/python
      YANBAN_E2B_HELPER: /app/e2b_provider.py
      E2B_API_KEY: ${E2B_API_KEY:-}
      YANBAN_E2B_TEMPLATE: ${YANBAN_E2B_TEMPLATE:-yanban-research-v1}
      YANBAN_SANDBOX_DB_URL: jdbc:mysql://mysql:3306/${YANBAN_SANDBOX_DB_NAME:-yanban_sandbox}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    depends_on:
      mysql:
        condition: service_healthy
      sandbox-db-init:
        condition: service_completed_successfully
    volumes:
      - sandbox_broker_data:/var/lib/yanban-sandbox
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"Authorization: Bearer $$YANBAN_SANDBOX_BROKER_TOKEN\" http://127.0.0.1:8091/internal/v1/health >/dev/null"]
      interval: 15s
      timeout: 15s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${APP_HTTP_PORT:-18080}:80"
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
  es_data:
  kafka_data:
  minio_data:
  api_data:
  sandbox_broker_data:
